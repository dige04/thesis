experiment:
  name: "memory_pruning_coding_agents"
  benchmark: "swebench_cl"
  sequence_mode: "chronological_by_repo"
  same_repo_retrieval_only: true
  master_seed: 42
  seeds: [1, 2, 3]  # 3 seeds for ALL 6 conditions (Frozen Invariant #2)
  
  # Pilot mode configuration (Requirement 30)
  pilot_mode:
    enabled: false                    # Set to true for pilot runs
    num_sequences: 2                  # 2 sequences for pilot (default)
    num_seeds: 1                      # 1 seed for pilot (uses first seed)
    log_retrieval_quality: true       # Log precision@k, recall@k metrics
    calibration_locked: false         # Lock after Week 4 calibration

agent:
  type: "langgraph_coding_agent"
  # Model names are documented defaults. At RUNTIME the provider endpoint
  # (base_url) + API key come from .env via src/config/llm_factory.py, and env
  # vars (LLM_MAIN_MODEL, LLM_SUMMARY_MODEL, LLM_CLASSIFIER_MODEL) override
  # these. See AGENTS.md "Running on OpenCode Zen".
  # DEVIATION D1 from v5 §0.1 (model frozen to GPT-5.4): switched to OpenCode Zen
  # "go" tier (OpenAI-compatible), held constant across all 6 conditions × 3 seeds.
  main_model: "kimi-k2.6"              # main coding agent (oa-compat, large ctx)
  summary_model: "kimi-k2.5"           # reflection + CLS consolidation
  classifier_model: "kimi-k2.5"        # 5-type classification (JSON-mode verified)
  temperature: 0
  max_steps_per_task: 20              # LOCKED
  max_tool_calls_per_task: 80
  max_test_runs_per_task: 5
  max_wall_time_minutes: 20
  # Execution backend (decision A+G). "container" runs the 8 tools INSIDE the
  # per-task swebench instance container via `docker exec`, so run_tests acts
  # against the repo's installed deps. Required for real SWE-bench solving — the
  # host LocalBackend cannot run a per-commit test env (smoke 0/3 root cause).
  # instance_namespace="swebench" + x86_64 => agent runs the SAME prebuilt image
  # the eval harness pulls. Set execution_backend="local" for host unit tests.
  execution_backend: "container"
  instance_arch: "x86_64"
  instance_namespace: "swebench"

reflection:
  # Summary model for memory reflection (read at sequence_runner.py:622).
  # DEVIATION D1 from v5: OpenCode Zen go instead of gpt-4o-mini.
  model: "kimi-k2.5"
  temperature: 0

memory:
  backend: "sqlite_faiss"
  top_k: 5                            # confirm in spike
  max_context_tokens: 2000            # confirm in spike
  max_records: 100
  max_storage_tokens: 30000
  retrieve_same_repo_only: true
  embedding_max_tokens: 7500          # hard cap before truncation
  injection_order: "best_last"
  # Embedder lives here (sequence_runner reads memory.embedding_model). RUNTIME
  # endpoint + key come from .env (EMBEDDING_* vars) via llm_factory.py.
  # DEVIATION from v5: local Ollama embedder instead of text-embedding-3-small.
  embedding_model: "nomic-embed-text-v2-moe"
  embedding_dim: 768                  # MUST match embedder; rebuild FAISS if changed

retrieval:
  scoring: "pure_cosine"              # IDENTICAL across all conditions
  tie_break: "most_recent"
  overflow: "drop_lowest_similarity"
  item_truncation: false              # drop whole item if over budget

policies:
  no_memory:
    enabled: true

  full_memory:
    enabled: true
    obey_retrieval_budget: true
    delete_records: false

  random_prune:
    enabled: true
    max_records: 100
    seeds: [1, 2, 3]

  recency_prune:
    enabled: true
    max_records: 100

  type_aware_decay:
    enabled: true
    max_records: 100
    frequency_exponent: 0.5
    type_params:
      architectural: { base: 1.0, decay: 0.05 }
      api_change:    { base: 0.8, decay: 0.15 }
      bug_fix:       { base: 0.6, decay: 0.25 }
      test_update:   { base: 0.4, decay: 0.35 }
      config:        { base: 0.3, decay: 0.40 }

  cls_consolidation:
    enabled: true
    max_records: 100
    interval_tasks: 5                 # fixed schedule
    min_cluster_size: 3
    max_summary_tokens: 350
    old_memory_threshold: 10
    similarity_threshold: 0.70
    fallback_prune: "type_aware_decay"

execution:
  # D5 (authorized 2026-06-02): the actual host is LOCAL arm64 macOS, NOT the
  # v5 §0.1 #4/#5 x86_64 VPS. The vps_* keys below are retained as the v5
  # reference spec (provenance/schema compat); host_arch records the real arch.
  # Runtime concurrency is sequential-first (decision K) regardless of the
  # docker_max_workers default; bounded parallelism (<=3) is a post-pilot switch.
  host_arch: "arm64"                  # actual execution arch (D5); overrides v5 §0.1 #4/#5
  docker_max_workers: 4               # v5 reference; runner runs sequentially for the pilot
  vps_arch: "x86_64"                  # v5 reference VPS spec (provenance)
  vps_ram_gb: 32
  vps_disk_gb: 250
  vps_cores: 8

logging:
  save_raw_trajectory: true
  save_patches: true
  save_test_output: true
  save_retrieved_memories: true
  save_prompt_tokens: true
  save_completion_tokens: true
  save_memory_snapshots: true
  snapshot_at_every_task_boundary: true

evaluation:
  harness: "eval_v3"
  # Image source for the swebench harness. "swebench" PULLS prebuilt x86_64
  # instance images from Docker Hub (native x86_64 host — fast, no local build);
  # "" builds the instance image locally (arm64/D5 path). Native x86_64 host =>
  # no arm64-unbuildable exclusions; absolute rates comparable to the literature.
  namespace: "swebench"
  dataset_name: "princeton-nlp/SWE-bench_Verified"
  timeout_seconds: 1800               # per-instance test timeout (seconds)
  cl_metric_wrapper: "custom"         # ~100 LOC computing a_{i,j} matrix
  primary_metric: "CL_F1"
  bootstrap_iterations: 5000
  bootstrap_method: "BCa"
  confidence_level: 0.95
  effect_size: "rank_biserial"
  multiple_comparison_correction: "holm"
  # DEVIATION from v5: Ollama Cloud is flat-rate (GPU-time), so per-token USD is
  # not meaningful. The CL-F1-vs-cost Pareto x-axis uses this proxy instead.
  # One of: usd | tokens | walltime. Also settable via COST_METRIC_MODE in .env.
  cost_metric_mode: "tokens"

statistical:
  primary_test: "wilcoxon_signed_rank"
  primary_unit: "sequence_level_means"
  primary_n: 8
  planned_contrasts:
    - ["full_memory", "no_memory"]
    - ["full_memory", "random_prune"]
    - ["full_memory", "recency_prune"]
    - ["full_memory", "type_aware_decay"]
    - ["full_memory", "cls_consolidation"]
  task_level_model: "glmm_binomial_logit"
  feature_analysis_metric: "PR_AUC"
  vif_threshold: 5.0
